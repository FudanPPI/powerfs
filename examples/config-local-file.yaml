node:
  node_id: "volume-001"
  node_type: "Volume"
  zone: "zone-a"
  rack: "rack-01"
  data_center: "dc-01"

storage:
  backend:
    backend_type: "LocalFile"
    node_id: "volume-001"
    type: "local_file"
    data_dir: "/data/powerfs"
    devices:
      - name: "ssd1"
        total_capacity: 107374182400
      - name: "ssd2"
        total_capacity: 107374182400
      - name: "ssd3"
        total_capacity: 107374182400
      - name: "ssd4"
        total_capacity: 107374182400
  checksum_algorithm: "Crc32c"
  volume_size_gib: 100
  max_volumes_per_device: 100
  compact_threshold_percent: 30.0
  compact_interval_seconds: 3600

network:
  grpc_port: 8080
  grpc_threads: 4
  grpc_conn_timeout_seconds: 30
  grpc_enable_tcp_no_delay: true
  master_addresses:
    - "http://master1:9333"
    - "http://master2:9333"
    - "http://master3:9333"

reliability:
  bitrot_scan_interval_seconds: 3600
  bitrot_scan_enabled: true
  ec_data_shards: 8
  ec_parity_shards: 4
  recycle_bin_retention_seconds: 2592000
  ha_enabled: false

performance:
  metadata_cache_size_gib: 10
  needle_index_cache_size_gib: 5
  ec_thread_count: 8
  io_thread_count: 16
  write_buffer_size_mib: 64
  read_ahead_size_kib: 1024

logging:
  level: "info"
  format: "Text"
  file_path: "/var/log/powerfs/powerfs.log"
  max_file_size_mib: 100
  max_file_count: 10
