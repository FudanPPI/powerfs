node:
  node_id: "volume-spdk-001"
  node_type: "Volume"
  zone: "zone-a"
  rack: "rack-01"

storage:
  backend:
    backend_type: "Spdk"
    node_id: "volume-spdk-001"
    type: "spdk"
    # SPDK JSON-RPC Unix socket 路径 (进程内模式下 SPDK 在当前进程启动 RPC server)
    # 默认 /var/tmp/spdk.sock,可省略此字段
    rpc_socket_path: "/var/tmp/spdk.sock"
    # 本地 NVMe 设备 (PCIe transport)
    # 注意: nvme0n1 上有 target 目录,不可使用;只用 nvme1n1/nvme2n1/nvme3n1
    # transport_string 填 PCI 地址 (SPDK RPC bdev_nvme_attach_controller 用 PCIe transport)
    # 可通过 `readlink -f /sys/class/nvme/nvmeN/device` 获取
    # 设备 attach 是异步的:服务启动 → SPDK init → RPC server ready → 逐个 attach
    devices:
      - name: "nvme1n1"
        transport_string: "0000:03:00.0"
      - name: "nvme2n1"
        transport_string: "0000:04:00.0"
      - name: "nvme3n1"
        transport_string: "0000:05:00.0"
  checksum_algorithm: "Crc32c"
  volume_size_gib: 100
  max_volumes_per_device: 100
  compact_threshold_percent: 30.0
  compact_interval_seconds: 3600

network:
  grpc_port: 8080
  grpc_threads: 8
  grpc_conn_timeout_seconds: 30
  grpc_enable_tcp_no_delay: true
  master_addresses:
    - "http://master1:9333"
    - "http://master2:9333"
    - "http://master3:9333"

raft:
  enabled: false
  node_id: 0
  dir: null
  peers: []
  advertise_addr: null
  election_tick: 10
  heartbeat_tick: 3

reliability:
  bitrot_scan_interval_seconds: 3600
  bitrot_scan_enabled: true
  ec_data_shards: 8
  ec_parity_shards: 4
  recycle_bin_retention_seconds: 2592000
  ha_enabled: false

performance:
  metadata_cache_size_gib: 32
  needle_index_cache_size_gib: 16
  ec_thread_count: 16
  io_thread_count: 32
  write_buffer_size_mib: 128
  read_ahead_size_kib: 2048

logging:
  level: "info"
  format: "Json"
  file_path: "/var/log/powerfs/powerfs.log"
  max_file_size_mib: 100
  max_file_count: 10
