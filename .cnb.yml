# CI流水线（推送自动构建）
main:
  push:
    - runner:
        cpus: 16
      docker:
        image: rust:1.96-slim
        volumes:
          - cargo_registry:copy-on-write
          - target:copy-on-write
      stages:
        - name: Install git & system libs
          script: apt update && apt install -y git libssl-dev gcc g++ pkg-config libclang-dev libfuse-dev libsnappy-dev libzstd-dev protobuf-compiler
        - name: Config crates mirror
          script:
            - mkdir -p ~/.cargo
            - echo '[source.crates-io]' >> ~/.cargo/config.toml
            - echo 'replace-with = "rsproxy"' >> ~/.cargo/config.toml
            - echo '[source.rsproxy]' >> ~/.cargo/config.toml
            - echo 'registry = "https://rsproxy.cn/crates.io-index"' >> ~/.cargo/config.toml
        - name: Lint & Build
          script:
            - cargo clippy --all-targets --all-features -- -D warnings
            - cargo build --release
        - name: Test
          script:
            - cargo test --all --verbose

# 云端VSCode开发环境（tests分支）
$:
  vscode:
    - runner:
        cpus: 16 
      services:
        - vscode
      docker:
        image: rust:1.96-slim
      branches: tests
      stages:
        - name: Install git + 编译系统依赖
          script: apt update && apt install -y curl git libssl-dev gcc g++ protobuf-compiler pkg-config libclang-dev libfuse-dev libsnappy-dev libzstd-dev
        - name: Add components
          script: rustup component add rustfmt clippy rust-src
        - name: checkout
          script: git checkout tests && git pull origin tests
        - name: 国内crates镜像
          script:
            - mkdir -p ~/.cargo
            - echo '[source.crates-io]' >> ~/.cargo/config.toml
            - echo 'replace-with = "rsproxy"' >> ~/.cargo/config.toml
            - echo '[source.rsproxy]' >> ~/.cargo/config.toml
            - echo 'registry = "https://rsproxy.cn/crates.io-index"' >> ~/.cargo/config.toml
        - name: 预拉取依赖
          script: cargo fetch
