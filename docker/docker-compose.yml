networks:
  powerfs-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1

volumes:
  master-1-data:
  master-2-data:
  master-3-data:
  volume-1-data:
  volume-2-data:
  volume-3-data:
  redis-data:
  s3-data:
  filer-1-data:
  filer-2-data:

services:
  redis:
    image: redis:7-alpine
    container_name: redis
    networks:
      powerfs-network:
        ipv4_address: 172.20.0.50
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    command: redis-server --bind 0.0.0.0 --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  master-1:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: powerfs:latest
    container_name: master-1
    networks:
      powerfs-network:
        ipv4_address: 172.20.0.11
    volumes:
      - master-1-data:/data
      - ../config/master-1.toml:/etc/powerfs/master-1.toml
    ports:
      - "9333:9333"
    command: /app/powerfs master --config /etc/powerfs/master-1.toml
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9333 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3
    depends_on:
      redis:
        condition: service_healthy

  master-2:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: powerfs:latest
    container_name: master-2
    networks:
      powerfs-network:
        ipv4_address: 172.20.0.12
    volumes:
      - master-2-data:/data
      - ../config/master-2.toml:/etc/powerfs/master-2.toml
    ports:
      - "9334:9333"
    command: /app/powerfs master --config /etc/powerfs/master-2.toml
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9333 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3
    depends_on:
      master-1:
        condition: service_healthy

  master-3:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: powerfs:latest
    container_name: master-3
    networks:
      powerfs-network:
        ipv4_address: 172.20.0.13
    volumes:
      - master-3-data:/data
      - ../config/master-3.toml:/etc/powerfs/master-3.toml
    ports:
      - "9335:9333"
    command: /app/powerfs master --config /etc/powerfs/master-3.toml
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9333 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3
    depends_on:
      master-2:
        condition: service_healthy

  volume-1:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: powerfs:latest
    container_name: volume-1
    networks:
      powerfs-network:
        ipv4_address: 172.20.0.21
    volumes:
      - volume-1-data:/data
      - ../config/volume-1.toml:/etc/powerfs/volume-1.toml
    ports:
      - "8080:8080"
      - "8091:8091"
    command: /app/powerfs-volume --config /etc/powerfs/volume-1.toml --grpc-address 172.20.0.21:8080
    healthcheck:
      test: ["CMD-SHELL", "nc -z 172.20.0.21 8080 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3
    depends_on:
      master-1:
        condition: service_healthy

  volume-2:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: powerfs:latest
    container_name: volume-2
    networks:
      powerfs-network:
        ipv4_address: 172.20.0.22
    volumes:
      - volume-2-data:/data
      - ../config/volume-2.toml:/etc/powerfs/volume-2.toml
    ports:
      - "8081:8080"
      - "8092:8092"
    command: /app/powerfs-volume --config /etc/powerfs/volume-2.toml --grpc-address 172.20.0.22:8080
    healthcheck:
      test: ["CMD-SHELL", "nc -z 172.20.0.22 8080 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3
    depends_on:
      master-1:
        condition: service_healthy

  volume-3:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: powerfs:latest
    container_name: volume-3
    networks:
      powerfs-network:
        ipv4_address: 172.20.0.23
    volumes:
      - volume-3-data:/data
      - ../config/volume-3.toml:/etc/powerfs/volume-3.toml
    ports:
      - "8082:8080"
      - "8093:8093"
    command: /app/powerfs-volume --config /etc/powerfs/volume-3.toml --grpc-address 172.20.0.23:8080
    healthcheck:
      test: ["CMD-SHELL", "nc -z 172.20.0.23 8080 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3
    depends_on:
      master-1:
        condition: service_healthy

  filer-1:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: powerfs:latest
    container_name: filer-1
    networks:
      powerfs-network:
        ipv4_address: 172.20.0.35
    ports:
      - "8888:8888"
      - "8889:8889"
    volumes:
      - filer-1-data:/data/filer
      - ../config/filer-1.toml:/etc/powerfs/filer.toml
    command: /app/powerfs filer --config /etc/powerfs/filer-1.toml --node-id 1 --s3-address 172.20.0.35:8888 --grpc-address 172.20.0.35:8889 --raft-address 172.20.0.35:8890 --master-address 172.20.0.11:9333 --shard-count 2
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8888 && nc -z localhost 8889 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      master-1:
        condition: service_healthy

  filer-2:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: powerfs:latest
    container_name: filer-2
    networks:
      powerfs-network:
        ipv4_address: 172.20.0.36
    ports:
      - "8898:8888"
      - "8899:8889"
    volumes:
      - filer-2-data:/data/filer
      - ../config/filer-2.toml:/etc/powerfs/filer-2.toml
    command: /app/powerfs filer --config /etc/powerfs/filer-2.toml --node-id 2 --s3-address 172.20.0.36:8888 --grpc-address 172.20.0.36:8889 --raft-address 172.20.0.36:8890 --master-address 172.20.0.11:9333 --shard-count 2 --peers 172.20.0.35:8890 172.20.0.36:8890
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8888 && nc -z localhost 8889 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      filer-1:
        condition: service_healthy

  s3:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: powerfs:latest
    container_name: s3
    networks:
      powerfs-network:
        ipv4_address: 172.20.0.32
    volumes:
      - s3-data:/data
      - ../config/s3.toml:/etc/powerfs/s3.toml
    ports:
      - "9000:9000"
    command: /app/powerfs s3 --master 172.20.0.11:9333 --config /etc/powerfs/s3.toml
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9000 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3
    depends_on:
      master-1:
        condition: service_healthy

  monitor:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: powerfs:latest
    container_name: monitor
    networks:
      powerfs-network:
        ipv4_address: 172.20.0.30
    ports:
      - "8083:8081"
    volumes:
      - ../config/monitor.toml:/etc/powerfs/monitor.toml
    command: /app/powerfs-monitor --config /etc/powerfs/monitor.toml
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8081 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3
    depends_on:
      master-1:
        condition: service_healthy
      s3:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile-frontend
    image: powerfs-frontend:latest
    container_name: frontend
    networks:
      powerfs-network:
        ipv4_address: 172.20.0.31
    ports:
      - "8084:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3
    depends_on:
      monitor:
        condition: service_healthy

  fuse-1:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: powerfs:latest
    container_name: fuse-1
    cpus: '1.0'
    mem_limit: 512m
    init: true
    networks:
      powerfs-network:
        ipv4_address: 172.20.0.41
    devices:
      - /dev/fuse:/dev/fuse
    cap_add:
      - SYS_ADMIN
      - DAC_READ_SEARCH
    security_opt:
      - apparmor:unconfined
    privileged: true
    restart: unless-stopped
    volumes:
      - /tmp/powerfs/fuse1:/mnt/powerfs
      - ../config/fuse-1.toml:/etc/powerfs/fuse-1.toml
    command: /app/powerfs-fuse --mount-point /mnt/powerfs --config /etc/powerfs/fuse-1.toml
    depends_on:
      volume-1:
        condition: service_healthy
      volume-2:
        condition: service_healthy
      volume-3:
        condition: service_healthy

  fuse-2:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: powerfs:latest
    container_name: fuse-2
    cpus: '1.0'
    mem_limit: 512m
    init: true
    networks:
      powerfs-network:
        ipv4_address: 172.20.0.42
    devices:
      - /dev/fuse:/dev/fuse
    cap_add:
      - SYS_ADMIN
      - DAC_READ_SEARCH
    security_opt:
      - apparmor:unconfined
    privileged: true
    restart: unless-stopped
    volumes:
      - /tmp/powerfs/fuse2:/mnt/powerfs
      - ../config/fuse-2.toml:/etc/powerfs/fuse-2.toml
    command: /app/powerfs-fuse --mount-point /mnt/powerfs --config /etc/powerfs/fuse-2.toml
    depends_on:
      volume-1:
        condition: service_healthy
      volume-2:
        condition: service_healthy
      volume-3:
        condition: service_healthy
