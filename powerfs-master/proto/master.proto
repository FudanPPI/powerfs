syntax = "proto3";

package powerfs;

service MasterService {
    rpc SendHeartbeat(stream Heartbeat) returns (stream HeartbeatResponse);
    rpc KeepConnected(stream KeepConnectedRequest) returns (stream KeepConnectedResponse);
    rpc LookupVolume(LookupVolumeRequest) returns (LookupVolumeResponse);
    rpc Assign(AssignRequest) returns (AssignResponse);
    rpc VolumeList(VolumeListRequest) returns (VolumeListResponse);
    rpc VolumeGrow(VolumeGrowRequest) returns (VolumeGrowResponse);
    rpc Ping(PingRequest) returns (PingResponse);
    
    // Collection management
    rpc CreateCollection(CreateCollectionRequest) returns (CreateCollectionResponse);
    rpc DeleteCollection(DeleteCollectionRequest) returns (DeleteCollectionResponse);
    rpc GetCollection(GetCollectionRequest) returns (GetCollectionResponse);
    rpc ListCollections(ListCollectionsRequest) returns (ListCollectionsResponse);
    
    // Statistics
    rpc GetStatistics(StatisticsRequest) returns (StatisticsResponse);
    
    // Volume management
    rpc DeleteVolume(DeleteVolumeRequest) returns (DeleteVolumeResponse);
    
    // Cluster management
    rpc GetClusterInfo(ClusterInfoRequest) returns (ClusterInfoResponse);
}

message Heartbeat {
    string ip = 1;
    uint32 port = 2;
    string public_url = 3;
    uint64 max_file_key = 5;
    string data_center = 6;
    string rack = 7;
    uint32 admin_port = 8;
    repeated VolumeShortInfo volumes = 9;
    repeated VolumeShortInfo new_volumes = 10;
    repeated VolumeShortInfo deleted_volumes = 11;
    bool has_no_volumes = 12;
    uint32 grpc_port = 20;
    string id = 22;
}

message HeartbeatResponse {
    uint64 volume_size_limit = 1;
    string leader = 2;
    string metrics_address = 3;
    uint32 metrics_interval_seconds = 4;
    bool preallocate = 7;
}

message VolumeShortInfo {
    uint32 volume_id = 1;
    uint64 size = 2;
    bool read_only = 3;
    string collection = 4;
    uint32 replica_placement = 5;
    uint32 ttl = 6;
    string disk_type = 7;
}

message Location {
    string url = 1;
    string public_url = 2;
    uint32 grpc_port = 3;
    string data_center = 4;
}

message LookupVolumeRequest {
    repeated string volume_or_file_ids = 1;
    string collection = 2;
}

message LookupVolumeResponse {
    message VolumeIdLocation {
        string volume_or_file_id = 1;
        repeated Location locations = 2;
        string error = 3;
        string auth = 4;
    }
    repeated VolumeIdLocation volume_id_locations = 1;
}

message AssignRequest {
    uint64 count = 1;
    string replication = 2;
    string collection = 3;
    string ttl = 4;
    string data_center = 5;
    string rack = 6;
    string data_node = 7;
    string disk_type = 10;
}

message AssignResponse {
    string fid = 1;
    uint64 count = 4;
    string error = 5;
    string auth = 6;
    repeated Location replicas = 7;
    Location location = 8;
}

message KeepConnectedRequest {
    string client_type = 1;
    string client_address = 3;
    string version = 4;
    string filer_group = 5;
    string data_center = 6;
    string rack = 7;
}

message VolumeLocation {
    string url = 1;
    string public_url = 2;
    repeated uint32 new_vids = 3;
    repeated uint32 deleted_vids = 4;
    string leader = 5;
    string data_center = 6;
    uint32 grpc_port = 7;
}

message KeepConnectedResponse {
    VolumeLocation volume_location = 1;
}

message VolumeListRequest {}

message VolumeListResponse {
    message DataNodeInfo {
        string id = 1;
        string address = 2;
        uint32 grpc_port = 3;
        string data_center = 4;
        string rack = 5;
        repeated VolumeShortInfo volumes = 6;
    }
    repeated DataNodeInfo data_nodes = 1;
    uint64 volume_size_limit = 2;
}

message PingRequest {
    string target = 1;
    string target_type = 2;
}

message PingResponse {
    int64 start_time_ns = 1;
    int64 remote_time_ns = 2;
    int64 stop_time_ns = 3;
}

// VolumeGrow: request to allocate new volumes
message VolumeGrowRequest {
    string replication = 1;
    string collection = 2;
    string ttl = 3;
    string data_center = 4;
    string rack = 5;
    string data_node = 6;
    string disk_type = 7;
    uint32 count = 8;  // number of volumes to allocate
}

message VolumeGrowResponse {
    repeated uint32 new_volume_ids = 1;
    repeated Location locations = 2;
    string error = 3;
}

// Collection management messages
message CollectionInfo {
    string name = 1;
    string replication = 2;
    string ttl = 3;
    string disk_type = 4;
    uint64 max_volume_count = 5;
    uint64 volume_count = 6;
    uint64 created_at = 7;
    uint64 modified_at = 8;
}

message CreateCollectionRequest {
    string name = 1;
    string replication = 2;
    string ttl = 3;
    string disk_type = 4;
    uint64 max_volume_count = 5;
}

message CreateCollectionResponse {
    bool success = 1;
    string error = 2;
    CollectionInfo collection = 3;
}

message DeleteCollectionRequest {
    string name = 1;
}

message DeleteCollectionResponse {
    bool success = 1;
    string error = 2;
}

message GetCollectionRequest {
    string name = 1;
}

message GetCollectionResponse {
    bool success = 1;
    string error = 2;
    CollectionInfo collection = 3;
}

message ListCollectionsRequest {}

message ListCollectionsResponse {
    repeated CollectionInfo collections = 1;
    string error = 2;
}

// Volume management messages
message DeleteVolumeRequest {
    uint32 volume_id = 1;
}

message DeleteVolumeResponse {
    bool success = 1;
    string error = 2;
}

// Statistics messages
message StatisticsRequest {
    string collection = 1;
    string data_center = 2;
    string rack = 3;
}

message StatisticsResponse {
    // Cluster level
    uint64 total_volume_count = 1;
    uint64 total_node_count = 2;
    uint64 total_data_center_count = 3;
    uint64 total_rack_count = 4;
    
    // Volume level
    uint64 total_volume_size = 5;
    uint64 total_used_size = 6;
    uint64 available_volume_count = 7;
    uint64 full_volume_count = 8;
    uint64 read_only_volume_count = 9;
    
    // Collection level
    repeated CollectionStats collection_stats = 10;
    
    // Data center level
    repeated DataCenterStats data_center_stats = 11;
    
    // Rack level
    repeated RackStats rack_stats = 12;
    
    string error = 13;
}

message CollectionStats {
    string name = 1;
    uint64 volume_count = 2;
    uint64 total_size = 3;
    uint64 used_size = 4;
}

message DataCenterStats {
    string name = 1;
    uint64 node_count = 2;
    uint64 volume_count = 3;
    uint64 total_size = 4;
    uint64 used_size = 5;
}

message RackStats {
    string name = 1;
    string data_center = 2;
    uint64 node_count = 3;
    uint64 volume_count = 4;
    uint64 total_size = 5;
    uint64 used_size = 6;
}

// Raft service for multi-node communication
service RaftService {
    // Propose a command to the Raft cluster
    rpc Propose (ProposeRequest) returns (ProposeResponse);
    // Bidirectional streaming for Raft messages
    rpc RaftMessageStream (stream RaftMessage) returns (stream RaftMessage);
    // Get cluster membership
    rpc GetClusterInfo (ClusterInfoRequest) returns (ClusterInfoResponse);
    // Add node to cluster
    rpc AddNode (AddNodeRequest) returns (AddNodeResponse);
    // Remove node from cluster
    rpc RemoveNode (RemoveNodeRequest) returns (RemoveNodeResponse);
    // Transfer leadership to another node
    rpc TransferLeader (TransferLeaderRequest) returns (TransferLeaderResponse);
}

message ProposeRequest {
    bytes command = 1;  // Serialized RaftCommand
}

message ProposeResponse {
    bool success = 1;
    string error = 2;
    uint64 index = 3;  // Log index after commit
}

message RaftMessage {
    uint64 from_id = 1;
    uint64 to_id = 2;
    bytes message = 3;  // Serialized raft::eraftpb::Message
}

message ClusterInfoRequest {}

message ClusterInfoResponse {
    uint64 node_id = 1;
    string address = 2;
    bool is_leader = 3;
    uint64 term = 4;
    repeated string peers = 5;
}

message AddNodeRequest {
    uint64 node_id = 1;
    string address = 2;
}

message AddNodeResponse {
    bool success = 1;
    string error = 2;
}

message RemoveNodeRequest {
    uint64 node_id = 1;
}

message RemoveNodeResponse {
    bool success = 1;
    string error = 2;
}

message TransferLeaderRequest {
    uint64 target_node_id = 1;
}

message TransferLeaderResponse {
    bool success = 1;
    string error = 2;
}