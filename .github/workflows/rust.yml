name: Rust CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: true
    
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
            protobuf-compiler \
            libfuse-dev \
            fuse3 \
            pkg-config \
            libssl-dev
        sudo chmod 666 /dev/fuse
    
    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-registry-
    
    - name: Cache cargo index
      uses: actions/cache@v4
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-index-
    
    - name: Cache target directory
      uses: actions/cache@v4
      with:
        path: target
        key: ${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-target-
    
    - name: Create stub for enterprise edition if not present
      run: |
        if [ ! -d "powerfs-fuse-enterprise" ]; then
          mkdir -p powerfs-fuse-enterprise/src
          printf '[package]\nname = "powerfs-fuse-enterprise"\nversion = "0.1.0"\nedition = "2021"\n\n[dependencies]\npowerfs-orset = { path = "../powerfs-orset" }\ncrossbeam = "0.8"\n' > powerfs-fuse-enterprise/Cargo.toml
          echo "pub struct EnterpriseDirCache;" > powerfs-fuse-enterprise/src/lib.rs
        fi
    
    - name: Check formatting
      run: cargo fmt --all -- --check
    
    - name: Clippy
      run: cargo clippy --all -- -D warnings
    
    - name: Build
      run: cargo build --all --verbose
    
    - name: Run unit tests (no FUSE)
      run: cargo test --all --lib --verbose

    - name: Check if FUSE is available
      id: fuse-check
      run: |
        if [ -c /dev/fuse ] && sudo fusermount -V 2>/dev/null; then
          echo "fuse_available=true" >> $GITHUB_OUTPUT
          echo "FUSE is available"
        else
          echo "fuse_available=false" >> $GITHUB_OUTPUT
          echo "FUSE is NOT available, skipping integration tests"
        fi

    - name: Run FUSE integration tests
      if: steps.fuse-check.outputs.fuse_available == 'true'
      run: |
        cargo test --package powerfs-fuse --test fuse_minimal_test --verbose
        cargo test --package powerfs-fuse --test fuse_basic_test --verbose
        cargo test --package powerfs-fuse --test coherence_phase0_test --verbose
        cargo test --package powerfs-fuse --test coherence_phase1_test --verbose
        cargo test --package powerfs-fuse --test concurrent_consistency --verbose -- --test-threads=1
        cargo test --package powerfs-master --test coherence_phase2_test --verbose
        cargo test --package powerfs-master --test coherence_phase3_test --verbose
        cargo test --package powerfs-master --test coherence_failover_test --verbose
        cargo test --package powerfs-master --test master_outage_e2e_test --verbose -- --test-threads=1
